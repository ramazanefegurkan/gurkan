services:
  api:
    build:
      context: ./GurkanApi
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=halilorhondb-ln6nu7;Port=5432;Database=gurkan;Username=keycloak;Password=${DB_PASSWORD}"
      Jwt__Secret: ${JWT_SECRET}
      ASPNETCORE_URLS: "http://+:9080"
      Cors__AllowedOrigins__0: "https://kira.efegur.dev"
    volumes:
      - api_uploads:/app/uploads
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gurkan-api.rule=Host(`kira.efegur.dev`) && PathPrefix(`/api`)"
      - "traefik.http.routers.gurkan-api.entrypoints=websecure"
      - "traefik.http.routers.gurkan-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.gurkan-api.priority=2"
      - "traefik.http.services.gurkan-api.loadbalancer.server.port=9080"
    networks:
      - dokploy-network

  web:
    build:
      context: ./gurkan-ui
      args:
        VITE_API_URL: "https://kira.efegur.dev/api"
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gurkan-web.rule=Host(`kira.efegur.dev`)"
      - "traefik.http.routers.gurkan-web.entrypoints=websecure"
      - "traefik.http.routers.gurkan-web.tls.certresolver=letsencrypt"
      - "traefik.http.routers.gurkan-web.priority=1"
      - "traefik.http.services.gurkan-web.loadbalancer.server.port=80"
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true

volumes:
  api_uploads:
