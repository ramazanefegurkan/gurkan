services:
  api:
    build:
      context: ./GurkanApi
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=host.docker.internal;Port=5432;Database=${POSTGRES_DB:-gurkan};Username=${POSTGRES_USER:-postgres};Password=${DB_PASSWORD}"
      Jwt__Secret: ${JWT_SECRET}
      ASPNETCORE_URLS: "http://+:9080"
      Cors__AllowedOrigins__0: "https://kira.efegur.dev"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - api_uploads:/app/uploads
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`kira.efegur.dev`) && PathPrefix(`/api`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
      - "traefik.http.services.api.loadbalancer.server.port=9080"
    networks:
      - dokploy-network

  web:
    build:
      context: ./gurkan-ui
      args:
        VITE_API_URL: "https://kira.efegur.dev/api"
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web.rule=Host(`kira.efegur.dev`)"
      - "traefik.http.routers.web.entrypoints=websecure"
      - "traefik.http.routers.web.tls.certresolver=letsencrypt"
      - "traefik.http.services.web.loadbalancer.server.port=80"
      - "traefik.http.routers.web.priority=1"
      - "traefik.http.routers.api.priority=2"
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true

volumes:
  api_uploads:
